<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 螺帽分類益智遊戲</title>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 來在瀏覽器中編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #1c1830; overflow-x: hidden; touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- 將原本的 Lucide 圖示替換為獨立的 SVG 元件，避免外部依賴報錯 ---
        const ChevronLeft = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        );
        const RotateCcw = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const Undo2 = ({ className, strokeWidth = 3 }) => (
            <svg className={className} strokeWidth={strokeWidth} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
        );
        const Lightbulb = ({ className, strokeWidth = 2.5 }) => (
            <svg className={className} strokeWidth={strokeWidth} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        );
        const Plus = ({ className, strokeWidth = 3 }) => (
            <svg className={className} strokeWidth={strokeWidth} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        );
        const Trophy = ({ className, strokeWidth = 2 }) => (
            <svg className={className} strokeWidth={strokeWidth} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );

        // --- 遊戲邏輯與組件 ---
        const NUT_TYPES = {
          orange: { top: '#fdba74', body: '#f97316', left: '#fb923c', right: '#ea580c', icon: '⚡' },
          green: { top: '#86efac', body: '#22c55e', left: '#4ade80', right: '#16a34a', icon: '🍀' },
          purple: { top: '#d8b4fe', body: '#a855f7', left: '#c084fc', right: '#9333ea', icon: '🌙' },
          yellow: { top: '#fde047', body: '#eab308', left: '#facc15', right: '#ca8a04', icon: '☀️' },
          red: { top: '#fca5a5', body: '#ef4444', left: '#f87171', right: '#dc2626', icon: '❤️' },
          blue: { top: '#93c5fd', body: '#3b82f6', left: '#60a5fa', right: '#2563eb', icon: '💧' },
          pink: { top: '#f9a8d4', body: '#ec4899', left: '#f472b6', right: '#db2777', icon: '👑' },
          brown: { top: '#ddb892', body: '#b08968', left: '#cda27a', right: '#9c6644', icon: '🦴' },
          darkblue: { top: '#a78bfa', body: '#8b5cf6', left: '#a78bfa', right: '#7c3aed', icon: '🎵' },
          gray: { top: '#94a3b8', body: '#475569', left: '#64748b', right: '#334155', icon: '👻' },
          lightgreen: { top: '#bef264', body: '#84cc16', left: '#a3e635', right: '#65a30d', icon: '📷' },
          white: { top: '#f8fafc', body: '#cbd5e1', left: '#e2e8f0', right: '#94a3b8', icon: '⭐' },
        };

        const HIDDEN_NUT = { top: '#e2e8f0', body: '#94a3b8', left: '#cbd5e1', right: '#64748b', icon: '?' };
        const THREAD_GRADIENT = 'repeating-linear-gradient(-12deg, #64748b 0px, #64748b 3px, #cbd5e1 3px, #cbd5e1 7px)';
        const CYLINDER_SHADING = 'linear-gradient(to right, rgba(0,0,0,0.45) 0%, transparent 20%, transparent 75%, rgba(0,0,0,0.6) 100%)';
        const STACK_CAPACITY = 4;

        function App() {
          const [level, setLevel] = useState(1);
          const [stacks, setStacks] = useState([]);
          const [selectedIdx, setSelectedIdx] = useState(null);
          const [history, setHistory] = useState([]);
          const [isWon, setIsWon] = useState(false);
          const [extraBoltsUsed, setExtraBoltsUsed] = useState(0);
          const [hintCount, setHintCount] = useState(6);
          const [activeHint, setActiveHint] = useState(null);

          const generateLevel = useCallback((currentLevel) => {
            const colorCount = Math.min(2 + Math.ceil(currentLevel / 2), Object.keys(NUT_TYPES).length);
            const availableColors = Object.keys(NUT_TYPES).slice(0, colorCount);
            
            let allNuts = [];
            availableColors.forEach(color => {
              for (let i = 0; i < STACK_CAPACITY; i++) {
                allNuts.push({ color, id: `${color}-${i}` });
              }
            });

            for (let i = allNuts.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [allNuts[i], allNuts[j]] = [allNuts[j], allNuts[i]];
            }

            const newStacks = [];
            let currentStack = [];
            
            allNuts.forEach((nut, index) => {
              const isHidden = currentLevel > 2 && Math.random() > 0.6 && (index % STACK_CAPACITY) < 2; 
              currentStack.push({ ...nut, hidden: isHidden });
              
              if (currentStack.length === STACK_CAPACITY) {
                currentStack[STACK_CAPACITY - 1].hidden = false;
                newStacks.push(currentStack);
                currentStack = [];
              }
            });

            newStacks.push([]);
            newStacks.push([]);

            setStacks(newStacks);
            setSelectedIdx(null);
            setHistory([]);
            setIsWon(false);
            setExtraBoltsUsed(0);
            setActiveHint(null); 
          }, []);

          useEffect(() => {
            generateLevel(level);
          }, [level, generateLevel]);

          const checkWin = (currentStacks) => {
            return currentStacks.every(stack => {
              if (stack.length === 0) return true;
              if (stack.length !== STACK_CAPACITY) return false;
              const firstColor = stack[0].color;
              return stack.every(nut => nut.color === firstColor && !nut.hidden);
            });
          };

          const handleStackClick = (idx) => {
            if (isWon) return;

            setActiveHint(null); 

            const clickedStack = stacks[idx];

            if (selectedIdx === idx) {
              setSelectedIdx(null);
              return;
            }

            if (selectedIdx === null) {
              if (clickedStack.length > 0) {
                setSelectedIdx(idx);
              }
              return;
            }

            const sourceStack = stacks[selectedIdx];
            const targetStack = clickedStack;
            const movingNut = sourceStack[sourceStack.length - 1];

            const isValidMove = 
              targetStack.length < STACK_CAPACITY && 
              (targetStack.length === 0 || targetStack[targetStack.length - 1].color === movingNut.color);

            if (isValidMove) {
              const newStacks = stacks.map(s => [...s]);
              setHistory([...history, JSON.stringify(stacks)]);
              const poppedNut = newStacks[selectedIdx].pop();
              newStacks[idx].push(poppedNut);

              if (newStacks[selectedIdx].length > 0) {
                newStacks[selectedIdx][newStacks[selectedIdx].length - 1].hidden = false;
              }

              setStacks(newStacks);
              setSelectedIdx(null);

              if (checkWin(newStacks)) {
                setIsWon(true);
              }
            } else {
              if (clickedStack.length > 0) {
                setSelectedIdx(idx);
              } else {
                setSelectedIdx(null);
              }
            }
          };

          const handleUndo = () => {
            if (history.length > 0 && !isWon) {
              const previousState = JSON.parse(history[history.length - 1]);
              setStacks(previousState);
              setHistory(history.slice(0, -1));
              setSelectedIdx(null);
            }
          };

          const handleAddBolt = () => {
            if (extraBoltsUsed < 1 && !isWon) {
              setHistory([...history, JSON.stringify(stacks)]);
              setStacks([...stacks, []]);
              setExtraBoltsUsed(extraBoltsUsed + 1);
            }
          };

          const handleHint = () => {
            if (hintCount <= 0 || isWon || activeHint) return;

            let foundMove = null;

            for (let i = 0; i < stacks.length; i++) {
              if (stacks[i].length === 0) continue;
              const sourceTop = stacks[i][stacks[i].length - 1];

              for (let j = 0; j < stacks.length; j++) {
                if (i === j) continue;
                if (stacks[j].length > 0 && stacks[j].length < STACK_CAPACITY) {
                  const targetTop = stacks[j][stacks[j].length - 1];
                  if (sourceTop.color === targetTop.color) {
                    foundMove = { source: i, target: j };
                    break;
                  }
                }
              }
              if (foundMove) break;
            }

            if (!foundMove) {
              for (let i = 0; i < stacks.length; i++) {
                if (stacks[i].length > 1) { 
                  for (let j = 0; j < stacks.length; j++) {
                    if (stacks[j].length === 0) {
                      foundMove = { source: i, target: j };
                      break;
                    }
                  }
                }
                if (foundMove) break;
              }
            }

            if (foundMove) {
              setActiveHint(foundMove);
              setHintCount(prev => prev - 1);
            }
          };

          return (
            <div className="min-h-screen bg-[#1c1830] text-white font-sans flex flex-col max-w-2xl mx-auto shadow-2xl overflow-hidden relative selection:bg-transparent">
              
              <header className="flex items-center justify-between p-6 pb-2">
                <button className="p-3 bg-white/5 hover:bg-white/10 rounded-full transition-colors relative group">
                  <ChevronLeft className="w-6 h-6 text-white" />
                  <div className="absolute top-full mt-2 left-1/2 -translate-x-1/2 w-max px-2 py-1 bg-gray-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-lg border border-white/10">
                    回首頁
                  </div>
                </button>
                <div className="text-center">
                  <div className="text-xs font-bold tracking-widest text-white/50 uppercase mb-1">
                    {level > 5 ? '困難模式' : '益智解謎'}
                  </div>
                  <h1 className="text-2xl font-black tracking-wide">第 {level} 關</h1>
                </div>
                <button 
                  onClick={() => generateLevel(level)}
                  className="p-3 bg-white/5 hover:bg-white/10 rounded-full transition-colors relative group"
                >
                  <RotateCcw className="w-6 h-6 text-white" />
                  <div className="absolute top-full mt-2 left-1/2 -translate-x-1/2 w-max px-2 py-1 bg-gray-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-lg border border-white/10">
                    重新開始本關
                  </div>
                </button>
              </header>

              <main className="flex-1 flex items-center justify-center p-2">
                <div className="flex flex-wrap justify-center gap-x-1 gap-y-16 max-w-full mt-8">
                  {stacks.map((stack, idx) => (
                    <div 
                      key={`bolt-${idx}`}
                      onClick={() => handleStackClick(idx)}
                      className="relative w-[72px] h-[210px] cursor-pointer group hover:-translate-y-1 transition-transform"
                    >
                      <div className="absolute bottom-0 w-[72px] h-[26px] z-10">
                         <div className="absolute bottom-0 w-full h-[16px] bg-[#94a3b8] rounded-[50%_/_8px] border-b-2 border-black/30 shadow-[0_6px_8px_rgba(0,0,0,0.5)]"></div>
                         <div className="absolute top-[8px] w-full h-[8px] bg-[#cbd5e1]"></div>
                         <div className="absolute top-0 w-full h-[16px] bg-[#f8fafc] rounded-[50%_/_8px] shadow-[inset_0_-2px_4px_rgba(0,0,0,0.15)] flex items-center justify-center">
                             <div className="w-[20px] h-[10px] bg-slate-800 rounded-[50%_/_5px] shadow-[inset_0_2px_4px_rgba(0,0,0,0.8)]"></div>
                         </div>
                      </div>

                      <div className="absolute bottom-[20px] left-[24px] w-[24px] h-[170px] z-0 flex flex-col items-center">
                         <div className="absolute top-[-6px] w-[24px] h-[12px] bg-gradient-to-br from-white to-[#94a3b8] rounded-[50%] border-[1px] border-[#64748b] z-10 shadow-[inset_0_-2px_3px_rgba(0,0,0,0.3)]"></div>
                         <div className="w-[24px] flex-1 relative overflow-hidden bg-[#cbd5e1] border-x-[1px] border-[#475569] rounded-b-[50%_/_4px]">
                             <div className="absolute inset-0" style={{ backgroundImage: THREAD_GRADIENT }}></div>
                             <div className="absolute inset-0" style={{ backgroundImage: CYLINDER_SHADING }}></div>
                         </div>
                      </div>

                      {stack.map((nut, nutIdx) => {
                          const isTop = nutIdx === stack.length - 1;
                          const isSelected = selectedIdx === idx && isTop;
                          const colors = nut.hidden ? HIDDEN_NUT : NUT_TYPES[nut.color];
                          
                          const bottomPos = 16 + (nutIdx * 30) + (isSelected ? 36 : 0);
                          const hexGradient = `linear-gradient(to right, ${colors.left} 0%, ${colors.left} 25%, ${colors.body} 25%, ${colors.body} 75%, ${colors.right} 75%, ${colors.right} 100%)`;

                          return (
                            <div 
                              key={nut.id}
                              className={`absolute left-[4px] w-[64px] h-[48px] transition-all duration-300 ease-out flex flex-col drop-shadow-[0_8px_6px_rgba(0,0,0,0.4)] ${isSelected ? 'drop-shadow-[0_20px_15px_rgba(0,0,0,0.5)] z-50' : ''}`}
                              style={{ 
                                bottom: `${bottomPos}px`, 
                                zIndex: 20 + nutIdx 
                              }}
                            >
                                <div 
                                  className="absolute bottom-0 w-[64px] h-[36px] rounded-[50%_/_10px] border-b border-black/20"
                                  style={{ background: hexGradient }}
                                >
                                    <div className="absolute left-[25%] w-[1.5px] h-[30px] top-[3px] bg-black/10"></div>
                                    <div className="absolute right-[25%] w-[1.5px] h-[30px] top-[3px] bg-black/10"></div>
                                    
                                    <div className="absolute bottom-[6px] w-full text-center text-[15px] font-black text-black/40 drop-shadow-sm">
                                        {nut.hidden ? '?' : colors.icon}
                                    </div>
                                </div>

                                <div 
                                  className="absolute top-0 w-[64px] h-[18px] rounded-[50%_/_9px] shadow-[inset_0_-3px_5px_rgba(0,0,0,0.15)] flex items-center justify-center"
                                  style={{ backgroundColor: colors.top }}
                                >
                                    <div className="w-[24px] h-[12px] bg-slate-900 rounded-[50%] relative overflow-hidden shadow-[inset_0_3px_6px_rgba(0,0,0,0.9)]">
                                        <div className="absolute bottom-0 left-0 w-[24px] h-[10px]">
                                            <div className="absolute inset-0" style={{ backgroundImage: THREAD_GRADIENT }}></div>
                                            <div className="absolute inset-0" style={{ backgroundImage: CYLINDER_SHADING }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                          );
                      })}

                      {selectedIdx === idx && (
                        <div className="absolute bottom-[10px] left-[0px] w-[72px] h-[30px] bg-white/20 rounded-[50%_/_15px] z-[5] animate-pulse pointer-events-none blur-md"></div>
                      )}

                      {activeHint && (activeHint.source === idx || activeHint.target === idx) && (
                        <div className="absolute bottom-[10px] left-[-4px] w-[80px] h-[200px] bg-[#facc15]/20 rounded-full z-[40] animate-pulse pointer-events-none blur-md border-2 border-[#facc15]/50"></div>
                      )}
                    </div>
                  ))}
                </div>
              </main>

              <footer className="p-6 pt-2 pb-10 flex justify-between items-end">
                <button 
                  onClick={handleUndo}
                  disabled={history.length === 0 || isWon}
                  className={`relative group flex flex-col items-center gap-2 transition-opacity ${history.length === 0 ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105 active:scale-95'}`}
                >
                  <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 w-max px-3 py-1.5 bg-gray-900 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-lg border border-white/10">
                    復原上一步
                    <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-900"></div>
                  </div>
                  
                  <div className="w-16 h-16 rounded-full bg-[#facc15] border-b-4 border-[#ca8a04] flex items-center justify-center shadow-lg relative overflow-hidden border-2 border-black/20">
                     <div className="absolute inset-0 bg-gradient-to-tr from-transparent to-white/30"></div>
                     <Undo2 className="w-8 h-8 text-yellow-950" />
                  </div>
                  <span className="text-[#facc15] font-bold text-sm tracking-wide">復原</span>
                </button>

                <div className="flex gap-4">
                  <button 
                     className={`relative group flex flex-col items-center gap-2 transition-transform ${hintCount === 0 || isWon ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105 active:scale-95'}`}
                     onClick={handleHint}
                     disabled={hintCount === 0 || isWon}
                  >
                    <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 w-max px-3 py-1.5 bg-gray-900 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-lg border border-white/10">
                      標示最佳移動路線
                      <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-900"></div>
                    </div>

                    <div className="w-16 h-16 rounded-full bg-[#facc15] border-b-4 border-[#ca8a04] flex items-center justify-center shadow-lg relative overflow-hidden border-2 border-black/20">
                       <div className="absolute inset-0 bg-gradient-to-tr from-transparent to-white/30"></div>
                       <Lightbulb className="w-8 h-8 text-yellow-950" />
                       <div className="absolute top-0 right-0 bg-white text-yellow-900 text-xs font-black w-5 h-5 rounded-full flex items-center justify-center m-1 shadow-sm border border-black/10">
                         {hintCount}
                       </div>
                    </div>
                    <span className="text-[#facc15] font-bold text-sm tracking-wide">提示</span>
                  </button>

                  <button 
                    onClick={handleAddBolt}
                    disabled={extraBoltsUsed >= 1 || isWon}
                    className={`relative group flex flex-col items-center gap-2 transition-all ${extraBoltsUsed >= 1 ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105 active:scale-95'}`}
                  >
                    <div className="absolute bottom-full mb-2 right-0 sm:left-1/2 sm:-translate-x-1/2 w-max px-3 py-1.5 bg-gray-900 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-lg border border-white/10">
                      增加一根空螺栓
                      <div className="absolute top-full right-6 sm:left-1/2 sm:-translate-x-1/2 border-4 border-transparent border-t-gray-900"></div>
                    </div>

                    <div className="w-16 h-16 rounded-full bg-[#facc15] border-b-4 border-[#ca8a04] flex items-center justify-center shadow-lg relative overflow-hidden border-2 border-black/20">
                       <div className="absolute inset-0 bg-gradient-to-tr from-transparent to-white/30"></div>
                       <Plus className="w-8 h-8 text-yellow-950" />
                       <div className="absolute bottom-1 right-1 bg-[#22c55e] rounded p-0.5 shadow-sm border border-black/20">
                         <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                       </div>
                    </div>
                    <span className="text-[#facc15] font-bold text-sm tracking-wide">新增</span>
                  </button>
                </div>
              </footer>

              {isWon && (
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 animate-in fade-in duration-300">
                  <div className="bg-[#2a2245] p-8 rounded-3xl shadow-2xl flex flex-col items-center transform animate-in zoom-in duration-500 delay-150 border-[3px] border-[#facc15]">
                    <div className="w-24 h-24 bg-[#facc15] rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(250,204,21,0.5)] mb-6 border-[3px] border-white">
                      <Trophy className="w-12 h-12 text-yellow-950" />
                    </div>
                    <h2 className="text-4xl font-black text-white mb-2 drop-shadow-md">成功過關！</h2>
                    <p className="text-gray-300 mb-8 font-medium">你已成功將所有螺帽分類完畢。</p>
                    
                    <button 
                      onClick={() => setLevel(l => l + 1)}
                      className="bg-[#22c55e] hover:bg-[#16a34a] text-white font-black text-xl py-4 px-12 rounded-full shadow-[0_6px_0_#15803d] hover:shadow-[0_4px_0_#15803d] hover:translate-y-1 transition-all active:shadow-none active:translate-y-2 border-2 border-[#15803d]"
                    >
                      下一關
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

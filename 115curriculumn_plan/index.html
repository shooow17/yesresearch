<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115課程計畫審查資料</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Left Panel: Chapter List -->
        <aside class="left-panel">
            <div class="panel-header">
                <div class="brand">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="brand-icon"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    <span>115課程計畫</span>
                </div>
                <div class="search-box">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="搜尋課程章節、文件名稱...">
                </div>
                <div class="chapter-meta">總計 0 單元</div>
            </div>
            
            <div id="chapterList" class="chapter-list">
                <div class="loading" style="padding: 24px; text-align: center; color: #757575;">載入目錄中...</div>
            </div>
        </aside>

        <!-- Right Panel: PDF Viewer -->
        <main class="right-panel">
            <header class="pdf-header">
                <div class="pdf-title-group">
                    <div class="course-tag hidden" id="courseTag">預覽中</div>
                    <h1 id="currentDocTitle">請點選左側目錄選擇文件</h1>
                </div>
                <a id="downloadBtn" href="#" target="_blank" class="btn-primary disabled" download title="下載 PDF">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    下載文件
                </a>
            </header>
            
            <div class="pdf-container">
                <div id="welcomeScreen" class="welcome-screen">
                    <svg viewBox="0 0 24 24" width="64" height="64" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <p>選擇左側課程單元以開始預覽</p>
                </div>
                <iframe id="pdfViewer" class="pdf-iframe hidden" title="PDF Viewer"></iframe>
            </div>
        </main>
    </div>

    <!-- Data script -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>

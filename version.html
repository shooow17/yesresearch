<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桃園市115年度國民小學教師聯合甄選複試教科書版本一覽表</title>
  
  <!-- 引入 Tailwind CSS 引擎 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 核心函式庫 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入較新版的 Babel 以在瀏覽器中編譯現代 JSX/JS 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 嚴格限制 body 滿版且絕對不產生捲軸 */
    html, body { 
      background-color: #0f172a; 
      margin: 0; 
      padding: 0; 
      width: 100vw;
      height: 100vh;
      overflow: hidden; 
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 主程式邏輯 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // === 資料設定 ===
    const SUBJECTS = [
      { id: 0, name: '國語', versions: ['康軒', '南一', '翰林'] },
      { id: 1, name: '數學', versions: ['康軒', '翰林', '南一'] },
      { id: 2, name: '英語', versions: ['康軒 (Wonder Word)', '翰林 (Here We Go)', '何嘉仁 (Super Fun)'] },
      { id: 3, name: '藝術', versions: ['康軒', '翰林'] },
      { id: 4, name: '健康與體育', versions: ['康軒', '南一', '翰林'] },
      { id: 5, name: '自然科學', versions: ['康軒', '翰林', '南一'] },
      { id: 6, name: '閩南語', versions: ['康軒', '真平'] },
      { id: 7, name: '客語', versions: ['康軒', '真平'] },
      { id: 8, name: '羅浮拉號原住民族文化課程', versions: ['泰雅文化與信仰 上學期', '泰雅文化與信仰 下學期', '部落文學與歷史 上學期', '部落文學與歷史 下學期', '傳統生活與技能 上學期', '傳統生活與技能 下學期', '藝術與樂舞 上學期', '藝術與樂舞 下學期'] },
      { id: 9, name: '光華哈嘎灣原住民族文化課程', versions: ['泰雅生活 A年段', '泰雅生活 B年段', '原來部落 A年段', '原來部落 B年段', '歲時祭儀 A年段', '歲時祭儀 B年段', '歷史傳說 A年段', '歷史傳說 B年段', '泰雅之美 A年段', '泰雅之美 B年段', '山林生態 A年段', '山林生態 B年段'] },
    ];

    // 版本對應的顏色與短名稱
    const getVersionStyle = (fullName) => {
      if (fullName.includes('康軒')) return { color: '#ef4444', short: '康軒' };
      if (fullName.includes('南一')) return { color: '#3b82f6', short: '南一' };
      if (fullName.includes('翰林')) return { color: '#10b981', short: '翰林' };
      if (fullName.includes('何嘉仁')) return { color: '#a855f7', short: '何嘉仁' };
      if (fullName.includes('真平')) return { color: '#f59e0b', short: '真平' };

      if (fullName.includes('泰雅文化與信仰')) return { color: '#8b5cf6', short: fullName.includes('上') ? '文化(上)' : '文化(下)' };
      if (fullName.includes('部落文學與歷史')) return { color: '#ec4899', short: fullName.includes('上') ? '文學(上)' : '文學(下)' };
      if (fullName.includes('傳統生活與技能')) return { color: '#14b8a6', short: fullName.includes('上') ? '技能(上)' : '技能(下)' };
      if (fullName.includes('藝術與樂舞')) return { color: '#f97316', short: fullName.includes('上') ? '藝術(上)' : '藝術(下)' };

      if (fullName.includes('泰雅生活')) return { color: '#6366f1', short: fullName.includes('A') ? '生活(A)' : '生活(B)' };
      if (fullName.includes('原來部落')) return { color: '#10b981', short: fullName.includes('A') ? '部落(A)' : '部落(B)' };
      if (fullName.includes('歲時祭儀')) return { color: '#f59e0b', short: fullName.includes('A') ? '祭儀(A)' : '祭儀(B)' };
      if (fullName.includes('歷史傳說')) return { color: '#ef4444', short: fullName.includes('A') ? '歷史(A)' : '歷史(B)' };
      if (fullName.includes('泰雅之美')) return { color: '#8b5cf6', short: fullName.includes('A') ? '之美(A)' : '之美(B)' };
      if (fullName.includes('山林生態')) return { color: '#06b6d4', short: fullName.includes('A') ? '生態(A)' : '生態(B)' };

      return { color: '#6b7280', short: fullName.substring(0, 4) }; 
    };

    // 智慧斷行處理函數
    const wrapBallText = (text) => {
      let parts = text.split(' ');
      let lines = [];
      parts.forEach(part => {
        const isChinese = /[\u4e00-\u9fa5]/.test(part);
        if (isChinese && part.length > 4) {
          const mid = Math.ceil(part.length / 2);
          lines.push(part.substring(0, mid));
          lines.push(part.substring(mid));
        } else if (!isChinese && part.length > 9) {
          const mid = Math.ceil(part.length / 2);
          lines.push(part.substring(0, mid));
          lines.push(part.substring(mid));
        } else {
          lines.push(part);
        }
      });
      return lines;
    };

    // === 樂透球物理引擎組件 ===
    // 接收 scale 屬性動態調整機器大小以適應畫面
    const LottoMachine = ({ currentOptions, isDrawing, drawnResult, scale }) => {
      const canvasRef = useRef(null);
      const ballsRef = useRef([]);
      const animationRef = useRef(null);

      const versionShortNames = (currentOptions && currentOptions.length > 0)
        ? currentOptions.map(opt => getVersionStyle(opt).short).join('、') 
        : '抽籤完畢';

      useEffect(() => {
        if (!currentOptions) return;
        
        const balls = [];
        let radius = 45; 
        let ballsPerOption = 1; 
        
        if (currentOptions.length > 3 && currentOptions.length <= 8) {
          radius = 36;
        } else if (currentOptions.length > 8) {
          radius = 30; 
        }

        currentOptions.forEach(option => {
          const style = getVersionStyle(option);
          balls.push({
            x: 240 + Math.random() * 100 - 50,
            y: 260 + Math.random() * 100 - 50,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            radius: radius,
            color: style.color,
            textLines: wrapBallText(option),
            fullName: option
          });
        });
        ballsRef.current = balls;
      }, [currentOptions]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2 - 20; 
        const containerRadius = 210; 

        const render = () => {
          ctx.clearRect(0, 0, width, height);

          // 畫罩子
          ctx.beginPath();
          ctx.arc(centerX, centerY, containerRadius, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
          ctx.fill();
          ctx.lineWidth = 6;
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
          ctx.stroke();

          // 高光
          ctx.beginPath();
          ctx.arc(centerX - 60, centerY - 70, 60, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
          ctx.fill();

          const balls = ballsRef.current;
          balls.forEach(ball => {
            if (isDrawing) {
              ball.vx += (Math.random() - 0.5) * 3;
              ball.vy += (Math.random() - 0.5) * 3 - 0.5;
              const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
              if (speed > 22) {
                ball.vx = (ball.vx / speed) * 22;
                ball.vy = (ball.vy / speed) * 22;
              }
            } else {
              ball.vy += 0.8; 
              ball.vx *= 0.98;
              ball.vy *= 0.98;
            }

            ball.x += ball.vx;
            ball.y += ball.vy;

            // 碰撞計算
            const dx = ball.x - centerX;
            const dy = ball.y - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist + ball.radius > containerRadius) {
              const overlap = dist + ball.radius - containerRadius;
              const nx = dx / dist;
              const ny = dy / dist;
              
              ball.x -= nx * overlap;
              ball.y -= ny * overlap;

              const dot = ball.vx * nx + ball.vy * ny;
              const bounce = isDrawing ? 1.05 : 0.6; 
              ball.vx = ball.vx - (1 + bounce) * dot * nx;
              ball.vy = ball.vy - (1 + bounce) * dot * ny;
            }

            // 畫出球體
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
              ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, ball.radius * 0.1,
              ball.x, ball.y, ball.radius
            );
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.3, ball.color);
            gradient.addColorStop(1, '#000000');
            
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.stroke();

            // 畫出多行文字
            const fontSize = Math.max(11, Math.floor(ball.radius * (ball.textLines.length > 2 ? 0.32 : 0.38)));
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${fontSize}px "Microsoft JhengHei", sans-serif`; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.shadowColor = "rgba(0, 0, 0, 0.8)";
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
            
            const lineSpacing = fontSize * 1.25;
            const startY = ball.y - ((ball.textLines.length - 1) * lineSpacing) / 2;
            ball.textLines.forEach((line, i) => {
              ctx.fillText(line, ball.x, startY + i * lineSpacing);
            });
            ctx.shadowColor = "transparent";
          });

          animationRef.current = requestAnimationFrame(render);
        }; 

        animationRef.current = requestAnimationFrame(render); 

        return () => {
          cancelAnimationFrame(animationRef.current);
        };
      }, [isDrawing]);

      const drawnLines = drawnResult ? wrapBallText(drawnResult) : [];

      return (
        <div className="flex justify-center items-center w-full h-full min-h-0 overflow-hidden">
          <div 
            className="relative flex justify-center items-center transform origin-center transition-transform duration-300" 
            style={{ transform: `scale(${scale})`, width: '500px', height: '640px' }}
          >
            {/* 機器本體 */}
            <div className="absolute top-0 left-0 w-[500px] h-[640px] bg-gradient-to-b from-gray-700 to-gray-900 rounded-t-full rounded-b-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.8)] border-8 border-gray-800 flex flex-col items-center pt-8">
              <canvas ref={canvasRef} width="480" height="480" className="z-10" />
              <div className="w-[480px] h-[140px] mt-0 bg-gradient-to-r from-yellow-600 via-yellow-400 to-yellow-600 rounded-2xl border-[6px] border-yellow-700 shadow-inner flex flex-col justify-center items-center relative overflow-hidden">
                 <div className="w-[120px] h-[60px] bg-gray-900 rounded-full absolute -top-6 shadow-inner"></div>
                 <div className="z-20 flex flex-col items-center mt-3 w-full px-6">
                   <span className="text-white text-xl font-black mb-1 bg-gradient-to-r from-red-600 to-red-800 px-6 py-1 rounded-full border-2 border-red-300 shadow-[0_0_15px_rgba(220,38,38,0.8)] tracking-widest animate-pulse">
                     等待抽籤版本
                   </span>
                   <h2 className={`font-black text-red-900 leading-tight text-center ${versionShortNames.length > 25 ? 'text-sm tracking-normal' : 'text-3xl tracking-widest'}`} style={{ textShadow: '1px 1px 0 #fff' }}>
                     {versionShortNames}
                   </h2>
                 </div>
              </div>
            </div>

            {/* 開獎球 */}
            {drawnResult && !isDrawing && (
              <div className="absolute z-50">
                <div 
                  className="w-[340px] h-[340px] rounded-full flex flex-col justify-center items-center shadow-[0_0_80px_rgba(255,255,0,1)] border-[8px] border-white px-4"
                  style={{ background: `radial-gradient(circle at 30% 30%, #fff, ${getVersionStyle(drawnResult).color} 60%, #000)` }}
                >
                  <span className={`text-white font-black drop-shadow-lg text-center ${drawnLines.length > 2 ? 'text-[60px] leading-[70px]' : 'text-[72px] leading-[85px]'}`}>
                    {drawnLines.map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>)}
                  </span>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // === 主應用程式 ===
    function App() {
      const [currentStep, setCurrentStep] = useState(0); 
      const [results, setResults] = useState(Array(SUBJECTS.length).fill(null));
      const [isDrawing, setIsDrawing] = useState(false);
      const [justDrawn, setJustDrawn] = useState(null); 
      
      const [isProcessing, setIsProcessing] = useState(false);
      const [isChecking, setIsChecking] = useState(false);
      const [checkPassed, setCheckPassed] = useState(false);

      // 動態縮放邏輯，確保畫面自適應且不出現捲軸
      const [machineScale, setMachineScale] = useState(1);
      
      useEffect(() => {
        const handleResize = () => {
          const isDesktop = window.innerWidth >= 1280; // xl 斷點
          // 計算左側面板可用的寬高 (扣除 Padding 與 標題、按鈕等元素)
          const availableWidth = isDesktop ? (window.innerWidth * 0.5 - 40) : (window.innerWidth - 32);
          const availableHeight = isDesktop ? (window.innerHeight - 250) : (window.innerHeight * 0.45);
          
          // 機器原始大小為 500x640，動態計算縮放比例
          const scaleW = availableWidth / 520;
          const scaleH = availableHeight / 660;
          
          // 取寬高最小的比例，並限制最大放大不超過 1.1 倍
          setMachineScale(Math.min(1.1, scaleW, scaleH));
        };

        window.addEventListener('resize', handleResize);
        handleResize();
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const isFinished = currentStep >= SUBJECTS.length;
      const currentSubject = !isFinished ? SUBJECTS[currentStep] : null;

      const handleDraw = () => {
        if (isProcessing || isFinished) return;

        setIsProcessing(true);
        setIsDrawing(true);
        setJustDrawn(null);

        setTimeout(() => {
          const versions = currentSubject.versions;
          const winner = versions[Math.floor(Math.random() * versions.length)];
          
          setJustDrawn(winner);
          setIsDrawing(false); 

          const newResults = [...results];
          newResults[currentStep] = winner;
          setResults(newResults);

          setTimeout(() => {
            const nextStep = currentStep + 1;
            setCurrentStep(nextStep);
            setJustDrawn(null); 
            
            if (nextStep >= SUBJECTS.length) {
              setIsChecking(true);
              setTimeout(() => {
                setIsChecking(false);
                setCheckPassed(true);
                setIsProcessing(false); 
              }, 1500);
            } else {
              setIsProcessing(false); 
            }
          }, 1500); 

        }, 3500); 
      };

      const resetAll = () => {
        setCurrentStep(0);
        setResults(Array(SUBJECTS.length).fill(null));
        setJustDrawn(null);
        setIsDrawing(false);
        setIsProcessing(false);
        setIsChecking(false);
        setCheckPassed(false);
      };

      // PDF 匯出 - 還原為原本的列表格式，並新增教育局局長簽名
      const handlePrint = () => {
        const printWindow = window.open('', '_blank');
        if (!printWindow) {
          alert('請允許瀏覽器開啟彈出視窗以進行列印！');
          return;
        }

        const now = new Date();
        const timeString = `${now.getFullYear()}/${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

        let tableHtml = `
          <!DOCTYPE html>
          <html lang="zh-TW">
          <head>
            <meta charset="UTF-8">
            <title>桃園市教師甄選試教版本 - 抽籤結果</title>
            <style>
              body { font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif; padding: 40px; color: #000; }
              h1 { text-align: center; font-size: 36px; letter-spacing: 4px; margin-bottom: 10px; }
              h2 { text-align: center; font-size: 26px; margin-bottom: 30px; color: #333; }
              .time { text-align: right; font-size: 16px; margin-bottom: 15px; color: #555; }
              table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 20px; }
              th, td { border: 2px solid #000; padding: 14px; text-align: center; }
              th { background-color: #e5e7eb; font-weight: bold; }
              td.subject { text-align: left; padding-left: 30px; font-weight: bold; font-size: 22px; }
              td.version { font-weight: bold; font-size: 24px; color: #dc2626; }
              .signature { text-align: right; font-size: 22px; margin-top: 40px; margin-right: 20px; font-weight: bold; }
              .print-btn { display: block; width: 280px; margin: 40px auto; padding: 18px; font-size: 20px; font-weight: bold; background: #2563eb; color: white; text-align: center; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
              .print-btn:hover { background: #1d4ed8; }
              @media print { 
                .print-btn { display: none !important; } 
                body { padding: 0; }
              }
            </style>
          </head>
          <body>
            <h1>桃園市115年度國民小學教師聯合甄選</h1>
            <h2>複試教科書版本一覽表 - 公開抽籤結果紀錄表</h2>
            <div class="time">產生時間：${timeString}</div>
            <table>
              <thead>
                <tr>
                  <th style="width: 12%;">序號</th>
                  <th style="width: 40%;">考試科目</th>
                  <th style="width: 48%;">抽中版本</th>
                </tr>
              </thead>
              <tbody>
        `;

        SUBJECTS.forEach((subject, index) => {
          const result = results[index] || '未抽籤';
          tableHtml += `
            <tr>
              <td>${index + 1}</td>
              <td class="subject">${subject.name}</td>
              <td class="version">${result}</td>
            </tr>
          `;
        });

        tableHtml += `
              </tbody>
            </table>
            <div class="signature">教育局局長簽名：________________________</div>
            <button class="print-btn" onclick="window.print()">點此列印 / 儲存 PDF</button>
            <script>
              setTimeout(() => { window.print(); }, 800);
            <\/script>
          </body>
          </html>
        `;

        printWindow.document.open();
        printWindow.document.write(tableHtml);
        printWindow.document.close();
      };

      const getButtonText = () => {
        if (isDrawing) return "🎲 機器攪拌中...";
        if (isProcessing && !isDrawing) return "⏳ 結果展示中...";
        return "🎯 點擊開始抽籤";
      };

      return (
        // 外層容器嚴格綁定 h-screen (100vh) 與 w-screen (100vw)，阻擋任何卷軸
        <div className="h-screen w-screen overflow-hidden bg-gradient-to-br from-indigo-900 via-purple-900 to-black text-white font-sans flex flex-col xl:flex-row p-3 sm:p-5 lg:p-6 gap-4 lg:gap-8 box-border">
          
          {/* 左側：樂透機與按鈕區域 (運用 flex-1 自適應剩餘空間) */}
          <div className="w-full xl:flex-1 h-[50vh] xl:h-full flex flex-col items-center justify-between relative py-2 min-h-0">
            
            {/* 標題區塊 (shrink-0 保證不被壓縮) */}
            <div className="shrink-0 text-center flex flex-col justify-center w-full mb-2">
              <h1 className="text-2xl sm:text-3xl lg:text-4xl xl:text-[42px] font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 mb-2 xl:mb-4 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] leading-tight">
                桃園市115年度國民小學教師聯合甄選<br className="hidden md:block" />複試教科書版本一覽表
              </h1>
              <div className="flex justify-center h-[40px]">
                {currentSubject && !isFinished && (
                  <div className="inline-block px-6 py-1.5 bg-blue-600 rounded-full border-4 border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.6)]">
                    <span className="text-lg lg:text-xl font-bold">現在抽籤科目：{currentSubject.name}</span>
                  </div>
                )}
                {isFinished && isChecking && (
                  <div className="inline-block px-6 py-1.5 bg-yellow-600 rounded-full border-4 border-yellow-400 shadow-[0_0_15px_rgba(202,138,4,0.6)] animate-pulse">
                    <span className="text-lg lg:text-xl font-bold text-white">🔍 系統檢查漏抽情形...</span>
                  </div>
                )}
                {isFinished && checkPassed && (
                  <div className="inline-block px-6 py-1.5 bg-green-600 rounded-full border-4 border-green-400 shadow-[0_0_15px_rgba(16,185,129,0.8)]">
                    <span className="text-lg lg:text-xl font-bold">✅ 檢查完畢，全數無漏抽！</span>
                  </div>
                )}
              </div>
            </div>

            {/* 樂透機體 (flex-1 搭配 min-h-0 防止溢出) */}
            <div className="flex-1 w-full min-h-0 flex items-center justify-center relative my-2">
              <LottoMachine 
                currentOptions={currentSubject ? currentSubject.versions : []} 
                isDrawing={isDrawing}
                drawnResult={justDrawn}
                scale={machineScale} // 傳入自適應縮放比例
              />
            </div>

            {/* 按鈕區塊 (shrink-0) */}
            <div className="shrink-0 text-center z-10 relative flex justify-center items-center h-[80px]">
              {!isFinished ? (
                 <button 
                    onClick={handleDraw}
                    disabled={isProcessing}
                    className={`px-8 lg:px-10 py-3 lg:py-4 rounded-full font-black text-xl lg:text-2xl shadow-[0_0_30px_rgba(59,130,246,0.6)] transform transition-all ${
                      isProcessing 
                      ? 'bg-gray-600 text-gray-400 cursor-not-allowed scale-95 border-4 border-gray-500' 
                      : 'bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white border-4 border-blue-300 hover:scale-105 active:scale-95'
                    }`}
                  >
                    {getButtonText()}
                 </button>
              ) : checkPassed ? (
                 <div className="flex gap-4 justify-center">
                    <button 
                      onClick={handlePrint}
                      className="px-6 lg:px-8 py-3 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white rounded-full font-black text-lg lg:text-xl shadow-[0_0_20px_rgba(16,185,129,0.6)] border-4 border-teal-300 transform hover:scale-105 active:scale-95 transition-all flex items-center gap-2"
                    >
                      <span>🖨️</span> 顯示所有版本
                    </button>
                    <button 
                      onClick={resetAll}
                      className="px-6 lg:px-8 py-3 bg-gradient-to-r from-red-600 to-pink-600 hover:from-red-500 hover:to-pink-500 text-white rounded-full font-black text-lg lg:text-xl shadow-[0_0_20px_rgba(225,29,72,0.6)] border-4 border-pink-300 transform hover:scale-105 active:scale-95 transition-all flex items-center gap-2"
                    >
                      <span>🔄</span> 重新開始
                    </button>
                 </div>
              ) : null}
            </div>
          </div>

          {/* 右側：結果看板 (佔畫面另一側，不會出現卷軸) */}
          <div className="w-full xl:w-[45%] h-[50vh] xl:h-full flex flex-col bg-gray-900/80 backdrop-blur-md border border-gray-700 rounded-3xl p-3 lg:p-5 shadow-2xl relative min-h-0 shrink-0">
            
            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 via-yellow-200 to-yellow-400"></div>
            
            <h2 className="shrink-0 text-xl lg:text-2xl font-bold text-center mb-2 lg:mb-4 text-yellow-400 flex items-center justify-center gap-2">
              <span>📋</span> 版本抽籤結果
            </h2>

            {/* 清單容器：使用 flex-1 均分畫面高度，min-h-0 搭配 hidden 防捲軸 */}
            <div className="flex-1 flex flex-col w-full gap-1.5 lg:gap-2 min-h-0 overflow-hidden justify-around">
              {SUBJECTS.map((subject, index) => {
                const isCurrent = currentStep === index;
                const isDone = results[index] !== null;
                const isWaiting = currentStep < index;

                return (
                  // 每一個清單項目都是 flex-1，會自動隨著剩餘空間拉伸/壓縮
                  <div 
                    key={subject.id} 
                    className={`
                      flex-1 w-full flex items-center justify-between px-3 lg:px-4 rounded-xl transition-all duration-500 min-h-0 overflow-hidden
                      ${isDone ? 'bg-gradient-to-r from-green-900/50 to-emerald-800/50 border border-green-500/50 shadow-[0_0_10px_rgba(16,185,129,0.1)]' : ''}
                      ${isCurrent ? 'bg-blue-900/60 border-2 border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.3)] transform scale-[1.02]' : ''}
                      ${isWaiting ? 'bg-gray-800/50 border border-gray-700 opacity-60' : ''}
                    `}
                  >
                    <div className="flex items-center gap-2 lg:gap-3 w-[45%] shrink-0">
                      <div className={`
                        w-7 h-7 lg:w-9 lg:h-9 shrink-0 rounded-full flex items-center justify-center font-bold text-sm lg:text-lg
                        ${isDone ? 'bg-green-500 text-white shadow-[0_0_8px_rgba(16,185,129,0.8)]' : isCurrent ? 'bg-blue-500 text-white animate-pulse shadow-[0_0_8px_rgba(59,130,246,0.8)]' : 'bg-gray-600 text-gray-300'}
                      `}>
                        {index + 1}
                      </div>
                      <span className={`text-base lg:text-[22px] font-bold truncate ${isCurrent ? 'text-blue-300' : 'text-gray-100'}`}>
                        {subject.name}
                      </span>
                    </div>
                    
                    <div className="flex-1 flex justify-end items-center min-w-0">
                      {isDone ? (
                        <span className="inline-block px-3 py-1 lg:px-4 lg:py-2 rounded-lg bg-gray-950/60 text-yellow-300 font-extrabold text-sm lg:text-2xl border border-yellow-500/40 shadow-inner max-w-full truncate">
                          {results[index]}
                        </span>
                      ) : isCurrent ? (
                        <span className="text-blue-400 font-bold text-sm lg:text-lg animate-pulse truncate">
                          {isProcessing ? (isDrawing ? '搖籤中...' : '展示中...') : '等待抽籤'}
                        </span>
                      ) : (
                        <span className="text-gray-500 text-sm lg:text-lg truncate">尚未開始</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

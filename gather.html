<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>課後照顧集合回報系統</title>
    <style>
        /* 全域設定 */
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            
            /* --- 關鍵修正開始 --- */
            /* 使用 dvh (Dynamic Viewport Height) 自動扣除瀏覽器工具列高度 */
            height: 100vh; /* 舊瀏覽器備案 */
            height: 100dvh; /* 新瀏覽器專用 */
            
            overflow: hidden; /* 保持禁止卷軸 */
            /* --- 關鍵修正結束 --- */

            display: flex;
            flex-direction: column;
        }

        header {
            flex: 0 0 auto;
            text-align: center;
            margin-bottom: 5px; /* 縮小標題下方的留白 */
        }

        h1 {
            margin: 0;
            font-size: 1.4rem; /* 標題字再縮小一點，留空間給按鈕 */
            font-weight: bold;
            color: #ffffff;
        }

        .status-bar {
            font-size: 0.85rem;
            color: #a4b0be;
            margin-top: 3px;
        }

        .grid-container {
            flex: 1 1 auto; /* 自動填滿剩餘空間 */
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-gap: 8px; /* 按鈕間距稍微縮小 */
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            align-content: stretch; 
            
            /* --- 關鍵修正：底部留白 --- */
            /* 預留底部空間，防止貼底被擋住 */
            padding-bottom: 10px; 
            /* 針對 iPhone X 以上的底部橫條 (Home Indicator) 增加安全距離 */
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        @media (min-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(4, 1fr);
                padding-bottom: 10px; /* 電腦版不需要太多底部留白 */
            }
        }

        .class-card {
            background-color: #3e4152;
            color: #e0e0e0;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            touch-action: manipulation;
        }

        .class-card.arrived {
            background-color: #00b894; 
            color: #ffffff;
            border-color: #00cec9;
            box-shadow: 0 0 15px rgba(0, 184, 148, 0.4);
        }

        .class-card.processing {
            opacity: 0.7;
            background-color: #636e72;
            cursor: wait;
        }

        @media (hover: hover) {
            .class-card:hover {
                background-color: #4e5266;
                transform: translateY(-2px);
            }
            .class-card.arrived:hover {
                background-color: #00b894;
            }
        }

        .class-card:active {
            transform: scale(0.96);
        }

    </style>
</head>
<body>

    <header>
        <h1>集合回報系統</h1>
        <div class="status-bar">
            系統狀態：<span id="connection-status" style="color: #ffeaa7;">連線中...</span>
        </div>
    </header>

    <div class="grid-container" id="classGrid">
        </div>

    <script>
        // -----------------------------------------------------------
        // ⚠️ 請將這裡替換成你的 Google Apps Script 部署網址
        // -----------------------------------------------------------
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjBcn08HTv11ugu09o3LAGDZA9DKol1_Ny0tYxjRnvvAmNHyIjD0GQ2_RLdmUZHbxs/exec"; 
        // -----------------------------------------------------------

        const classList = [
            "1A", "1B",
            "2A", "2B",
            "3A", "3B",
            "4A", "4B", "4C",
            "5A", "5B", "5C",
            "6A", "6B"
        ];

        const gridContainer = document.getElementById('classGrid');
        const statusSpan = document.getElementById('connection-status');
        const pendingUpdates = new Set();

        function initUI() {
            gridContainer.innerHTML = '';
            classList.forEach(className => {
                const btn = document.createElement('div');
                btn.className = 'class-card';
                btn.id = `btn-${className}`;
                btn.textContent = className;
                btn.addEventListener('click', () => {
                    if(!pendingUpdates.has(className)) {
                        toggleStatus(className);
                    }
                });
                gridContainer.appendChild(btn);
            });
            fetchData(); 
        }

        function toggleStatus(className) {
            const btn = document.getElementById(`btn-${className}`);
            const isCurrentlyArrived = btn.classList.contains('arrived');
            const newStatusIsArrived = !isCurrentlyArrived;

            if (newStatusIsArrived) {
                btn.classList.add('arrived');
            } else {
                btn.classList.remove('arrived');
            }

            pendingUpdates.add(className);
            btn.classList.add('processing');

            fetch(`${SCRIPT_URL}?action=update&class=${className}`)
                .then(response => response.json())
                .then(data => {
                    pendingUpdates.delete(className);
                    btn.classList.remove('processing');
                })
                .catch(err => {
                    console.error("更新失敗", err);
                    if (isCurrentlyArrived) {
                        btn.classList.add('arrived');
                    } else {
                        btn.classList.remove('arrived');
                    }
                    pendingUpdates.delete(className);
                    btn.classList.remove('processing');
                    alert("連線失敗，請重試");
                });
        }

        function fetchData() {
            fetch(`${SCRIPT_URL}?action=read`)
                .then(response => response.json())
                .then(data => {
                    updateGrid(data);
                    statusSpan.textContent = "🟢 線上同步中";
                    statusSpan.style.color = "#55efc4"; 
                })
                .catch(err => {
                    statusSpan.textContent = "🔴 連線中斷";
                    statusSpan.style.color = "#ff7675"; 
                });
        }

        function updateGrid(data) {
            classList.forEach(className => {
                if (pendingUpdates.has(className)) return; 
                const btn = document.getElementById(`btn-${className}`);
                if (data[className] === true) {
                    btn.classList.add('arrived');
                } else {
                    btn.classList.remove('arrived');
                }
            });
        }

        initUI();
        setInterval(fetchData, 3000);

    </script>
</body>
</html>

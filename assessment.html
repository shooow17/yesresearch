<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永順國小定期評量提醒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f8fafc;
            overflow: hidden; /* 禁止全頁捲軸 */
            height: 100vh;
        }

        /* 指針時鐘樣式：配合 3/5 版面放大 */
        .analog-clock {
            width: 450px; 
            height: 450px;
            border: 15px solid #1e293b;
            border-radius: 50%;
            position: relative;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .clock-number {
            position: absolute;
            font-size: 2.5rem; /* 放大數字 */
            font-weight: 900;
            color: #1e293b;
            width: 50px;
            height: 50px;
            text-align: center;
            line-height: 50px;
            transform: translate(-50%, -50%);
        }

        .dot {
            width: 20px;
            height: 20px;
            background: #1e293b;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
        }
        .hour-hand { width: 12px; height: 120px; background: #1e293b; z-index: 3; }
        .min-hand { width: 8px; height: 170px; background: #475569; z-index: 2; }
        .sec-hand { width: 3px; height: 195px; background: #ef4444; z-index: 4; }

        .clock-mark {
            position: absolute;
            width: 3px;
            height: 15px;
            background: #cbd5e1;
            left: 50%;
            transform-origin: 50% 225px; /* 對應半徑 450/2 */
        }
        .hour-mark { background: #94a3b8; width: 6px; height: 25px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #e2e8f0;
        }

        .active-tab {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        textarea {
            resize: none;
        }

        .scroll-container::-webkit-scrollbar { width: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-6">

    <main class="grid grid-cols-5 gap-6 h-full">
        
        <section class="col-span-3 flex flex-col items-center justify-center glass-card rounded-[3rem] shadow-sm border-2 border-white bg-white/50">
            <div class="analog-clock" id="analog-clock">
                <div class="dot"></div>
                <div class="hand hour-hand" id="hour-hand"></div>
                <div class="hand min-hand" id="min-hand"></div>
                <div class="hand sec-hand" id="sec-hand"></div>
            </div>
            
            <div class="text-center mt-10">
                <div id="digital-clock" class="text-[9rem] font-black text-slate-800 font-mono tabular-nums tracking-tighter leading-none">
                    00:00:00
                </div>
                <div id="date-display" class="text-4xl text-slate-500 mt-4 font-bold bg-slate-100 py-2 px-8 rounded-full inline-block">
                    2024年 01月 01日
                </div>
            </div>
        </section>

        <section class="col-span-2 flex flex-col gap-5 min-h-0">
            
            <div class="glass-card rounded-[2rem] p-5 shadow-sm border-2 border-white flex flex-col gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">永順國小定期評量提醒</h1>
                </div>
                
                <div class="flex bg-slate-100 p-1.5 rounded-xl justify-between items-center">
                    <span class="text-slate-500 font-bold ml-2 text-sm">版本切換</span>
                    <div class="flex gap-1">
                        <button onclick="setGrade('midHigh')" id="btn-midHigh" class="px-4 py-1.5 rounded-lg font-bold transition-all text-sm">中高年級</button>
                        <button onclick="setGrade('lower')" id="btn-lower" class="px-4 py-1.5 rounded-lg font-bold transition-all text-sm">低年級</button>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-[2.5rem] p-5 shadow-sm border-2 border-white flex flex-col min-h-0 h-[40%]">
                <div class="flex gap-2 mb-4 bg-slate-100 p-1 rounded-xl w-fit">
                    <button onclick="setDay(1)" id="day1-tab" class="px-6 py-2 rounded-lg font-black transition-all active-tab text-base">第一天</button>
                    <button onclick="setDay(2)" id="day2-tab" class="px-6 py-2 rounded-lg font-black transition-all text-slate-500 hover:bg-white text-base">第二天</button>
                </div>

                <div class="flex-grow overflow-auto scroll-container rounded-xl border border-slate-100">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 z-10">
                            <tr class="bg-slate-800 text-white text-sm">
                                <th class="p-3 font-bold">科目</th>
                                <th class="p-3 font-bold">時間</th>
                                <th class="p-3 font-bold">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="schedule-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="glass-card rounded-[2rem] p-5 shadow-sm border-2 border-white">
                <h2 class="text-lg font-bold mb-3 flex items-center text-slate-700">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    應考人數統計
                </h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100">
                        <label class="block text-xs text-blue-600 font-bold mb-1">應考人數</label>
                        <input type="number" value="25" class="w-full bg-transparent text-2xl font-black text-blue-800 focus:outline-none">
                    </div>
                    <div class="bg-emerald-50/50 p-3 rounded-xl border border-emerald-100">
                        <label class="block text-xs text-emerald-600 font-bold mb-1">實到人數</label>
                        <input type="number" value="25" class="w-full bg-transparent text-2xl font-black text-emerald-800 focus:outline-none">
                    </div>
                    <div class="bg-rose-50/50 p-3 rounded-xl border border-rose-100 col-span-2 flex items-center gap-3">
                        <label class="text-sm text-rose-600 font-bold whitespace-nowrap">缺考座號：</label>
                        <input type="text" placeholder="無" class="flex-grow bg-transparent text-xl font-black text-rose-800 placeholder-rose-300 focus:outline-none">
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-[2.5rem] p-5 shadow-sm border-2 border-white flex-grow flex flex-col min-h-0">
                <h2 class="text-lg font-bold mb-2 flex items-center text-slate-700">
                    <svg class="w-5 h-5 mr-2 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    注意事項
                </h2>
                <textarea class="w-full flex-grow p-4 rounded-2xl bg-amber-50/50 border-2 border-amber-100 text-amber-900 text-lg font-bold leading-relaxed focus:outline-none focus:bg-amber-50" placeholder="點擊此處輸入提醒..."></textarea>
            </div>
        </section>
    </main>

    <script>
        const examData = {
            midHigh: {
                day1: [{ name: '國語', start: '08:40', end: '09:20' },{ name: '自然', start: '09:30', end: '10:00' },{ name: '英語', start: '10:30', end: '11:10' }],
                day2: [{ name: '數學', start: '08:40', end: '09:20' },{ name: '社會', start: '09:30', end: '10:00' }]
            },
            lower: {
                day1: [{ name: '國語', start: '08:40', end: '09:20' },{ name: '生活', start: '09:30', end: '10:00' }],
                day2: [{ name: '數學', start: '08:40', end: '09:20' }]
            }
        };

        let currentGrade = 'midHigh';
        let currentDay = 1;

        function initClock() {
            const clock = document.getElementById('analog-clock');
            for (let i = 0; i < 60; i++) {
                const mark = document.createElement('div');
                mark.className = 'clock-mark' + (i % 5 === 0 ? ' hour-mark' : '');
                mark.style.transform = `translateX(-50%) rotate(${i * 6}deg)`;
                clock.appendChild(mark);
            }
            const radius = 180; // 配合 450px 調整數字半徑
            for (let i = 1; i <= 12; i++) {
                const num = document.createElement('div');
                num.className = 'clock-number';
                num.textContent = i;
                const angle = (i * 30 - 90) * (Math.PI / 180);
                const x = 225 + radius * Math.cos(angle);
                const y = 225 + radius * Math.sin(angle);
                num.style.left = `${x}px`;
                num.style.top = `${y}px`;
                clock.appendChild(num);
            }
        }

        function updateTime() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            document.getElementById('digital-clock').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            document.getElementById('date-display').textContent = now.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
            
            const hDeg = (h % 12) * 30 + m * 0.5;
            const mDeg = m * 6 + s * 0.1;
            const sDeg = s * 6;
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
            document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
            document.getElementById('sec-hand').style.transform = `translateX(-50%) rotate(${sDeg}deg)`;
            updateSubjectStatus(h, m);
        }

        function updateSubjectStatus(currH, currM) {
            const rows = document.querySelectorAll('.subject-row');
            const nowInMins = currH * 60 + currM;
            rows.forEach(row => {
                const [sH, sM] = row.dataset.start.split(':').map(Number);
                const [eH, eM] = row.dataset.end.split(':').map(Number);
                const startInMins = sH * 60 + sM, endInMins = eH * 60 + eM;
                const statusCell = row.querySelector('.status-cell');
                if (nowInMins < startInMins) {
                    statusCell.innerHTML = '<span class="text-slate-400 font-bold">待考</span>';
                } else if (nowInMins >= startInMins && nowInMins < endInMins) {
                    statusCell.innerHTML = '<span class="text-blue-600 font-black animate-pulse">考試中</span>';
                } else {
                    statusCell.innerHTML = '<span class="text-emerald-500 font-bold">完試</span>';
                }
            });
        }

        function setGrade(grade) {
            currentGrade = grade;
            document.getElementById('btn-midHigh').className = (grade === 'midHigh') ? "px-4 py-1.5 rounded-lg font-bold bg-blue-600 text-white shadow-md" : "px-4 py-1.5 rounded-lg font-bold text-slate-500 hover:bg-white";
            document.getElementById('btn-lower').className = (grade === 'lower') ? "px-4 py-1.5 rounded-lg font-bold bg-blue-600 text-white shadow-md" : "px-4 py-1.5 rounded-lg font-bold text-slate-500 hover:bg-white";
            renderSchedule();
        }

        function setDay(day) {
            currentDay = day;
            const d1 = document.getElementById('day1-tab'), d2 = document.getElementById('day2-tab');
            if (day === 1) { d1.className = "px-6 py-2 rounded-lg font-black transition-all active-tab text-base"; d2.className = "px-6 py-2 rounded-lg font-black transition-all text-slate-500 hover:bg-white text-base"; }
            else { d2.className = "px-6 py-2 rounded-lg font-black transition-all active-tab text-base"; d1.className = "px-6 py-2 rounded-lg font-black transition-all text-slate-500 hover:bg-white text-base"; }
            renderSchedule();
        }

        function renderSchedule() {
            const body = document.getElementById('schedule-body');
            body.innerHTML = '';
            examData[currentGrade][`day${currentDay}`].forEach(sub => {
                const tr = document.createElement('tr');
                tr.className = 'subject-row border-b border-slate-50';
                tr.dataset.start = sub.start; tr.dataset.end = sub.end;
                tr.innerHTML = `<td class="p-3 text-lg font-black text-slate-800">${sub.name}</td><td class="p-3 text-base font-mono font-bold text-slate-600">${sub.start}-${sub.end}</td><td class="p-3 status-cell text-sm"></td>`;
                body.appendChild(tr);
            });
            updateTime();
        }

        window.onload = () => { initClock(); setInterval(updateTime, 1000); setGrade('midHigh'); };
    </script>
</body>
</html>

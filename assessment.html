<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永順國小定期評量提醒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            overflow: hidden;
            height: 100vh;
            transition: background-color 0.5s ease;
        }

        /* 主題顏色定義 */
        body.theme-bright { background-color: #f1f5f9; color: #1e293b; }
        body.theme-soft { background-color: #fdf6e3; color: #5c441c; }
        body.theme-dark { background-color: #0f172a; color: #f1f5f9; }

        .glass-card {
            transition: background-color 0.5s ease, border-color 0.5s ease;
            border-width: 2px;
        }
        body.theme-bright .glass-card { background: rgba(255, 255, 255, 0.98); border-color: #ffffff; }
        body.theme-soft .glass-card { background: rgba(255, 253, 245, 0.98); border-color: #faeecd; }
        body.theme-dark .glass-card { background: rgba(30, 41, 59, 0.8); border-color: #334155; }

        /* 指針時鐘樣式 */
        .analog-clock {
            width: 440px; 
            height: 440px;
            border-radius: 50%;
            position: relative;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            transition: border-color 0.5s ease;
        }
        body.theme-bright .analog-clock { border: 12px solid #1e293b; }
        body.theme-soft .analog-clock { border: 12px solid #854d0e; }
        body.theme-dark .analog-clock { border: 12px solid #f1f5f9; }
        
        .clock-number {
            position: absolute;
            font-size: 2.2rem;
            font-weight: 900;
            width: 50px;
            height: 50px;
            text-align: center;
            line-height: 50px;
            transform: translate(-50%, -50%);
        }
        body.theme-bright .clock-number { color: #1e293b; }
        body.theme-soft .clock-number { color: #854d0e; }
        body.theme-dark .clock-number { color: #1e293b; } /* 鐘面維持白色背景 */

        .dot {
            width: 18px;
            height: 18px;
            background: #1e293b;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
        }
        .hour-hand { width: 10px; height: 110px; background: #1e293b; z-index: 3; }
        .min-hand { width: 7px; height: 160px; background: #475569; z-index: 2; }
        .sec-hand { width: 3px; height: 185px; background: #ef4444; z-index: 4; }

        .clock-mark {
            position: absolute;
            width: 3px;
            height: 14px;
            background: #cbd5e1;
            left: 50%;
            transform-origin: 50% 220px;
        }
        .hour-mark { background: #94a3b8; width: 5px; height: 22px; }

        .active-tab {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        textarea {
            resize: none;
            background: transparent;
        }

        /* 隱藏捲軸但保持版面完整 */
        .scroll-container::-webkit-scrollbar { width: 0px; background: transparent; }
        .scroll-container { scrollbar-width: none; -ms-overflow-style: none; }
    </style>
</head>
<body class="p-5 theme-bright">

    <main class="grid grid-cols-5 gap-5 h-full">
        
        <!-- 左側：時鐘與標題區域 (3/5) -->
        <section class="col-span-3 relative flex flex-col items-center justify-center glass-card rounded-[3rem] shadow-sm">
            
            <!-- 標題、版本、主題切換區域 -->
            <div class="absolute top-8 left-10 flex flex-col gap-4">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-1.5 rounded-lg shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <h1 id="main-title" class="text-2xl font-black tracking-tight">永順國小定期評量提醒</h1>
                </div>
                
                <!-- 切換功能組 -->
                <div class="flex flex-col gap-2">
                    <!-- 年級切換 -->
                    <div class="flex items-center gap-2 bg-black/5 p-1 rounded-xl w-fit">
                        <span class="text-xs font-bold px-2 opacity-60">模式</span>
                        <div class="flex gap-1">
                            <button onclick="setGrade('midHigh')" id="btn-midHigh" class="px-3 py-1 rounded-lg font-bold transition-all text-xs">中高年級</button>
                            <button onclick="setGrade('lower')" id="btn-lower" class="px-3 py-1 rounded-lg font-bold transition-all text-xs">低年級</button>
                        </div>
                    </div>
                    <!-- 主題切換 -->
                    <div class="flex items-center gap-2 bg-black/5 p-1 rounded-xl w-fit">
                        <span class="text-xs font-bold px-2 opacity-60">版面風格</span>
                        <div class="flex gap-1">
                            <button onclick="setTheme('bright')" id="theme-bright" class="px-3 py-1 rounded-lg font-bold transition-all text-xs border border-slate-300">亮色</button>
                            <button onclick="setTheme('soft')" id="theme-soft" class="px-3 py-1 rounded-lg font-bold transition-all text-xs border border-slate-300">柔色</button>
                            <button onclick="setTheme('dark')" id="theme-dark" class="px-3 py-1 rounded-lg font-bold transition-all text-xs border border-slate-300">暗色</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 時鐘部分 -->
            <div class="analog-clock" id="analog-clock">
                <div class="dot"></div>
                <div class="hand hour-hand" id="hour-hand"></div>
                <div class="hand min-hand" id="min-hand"></div>
                <div class="hand sec-hand" id="sec-hand"></div>
            </div>
            
            <div class="text-center mt-10">
                <div id="digital-clock" class="text-[10rem] font-black font-mono tabular-nums tracking-tighter leading-none">
                    00:00:00
                </div>
                <div id="date-display" class="text-3xl mt-4 font-bold bg-black/5 py-2 px-8 rounded-full inline-block">
                    2024年 01月 01日
                </div>
            </div>
        </section>

        <!-- 右側：資訊區 (2/5) -->
        <section class="col-span-2 flex flex-col gap-5 min-h-0">
            
            <!-- 考試科目區 -->
            <div class="glass-card rounded-[2.5rem] p-6 shadow-sm flex flex-col min-h-0 h-[50%]">
                <div class="flex gap-2 mb-4 bg-black/5 p-1 rounded-xl w-fit">
                    <button onclick="setDay(1)" id="day1-tab" class="px-6 py-2 rounded-lg font-black transition-all active-tab text-sm">第一天考試</button>
                    <button onclick="setDay(2)" id="day2-tab" class="px-6 py-2 rounded-lg font-black transition-all opacity-50 hover:bg-white/50 text-sm">第二天考試</button>
                </div>

                <div class="flex-grow overflow-hidden rounded-xl">
                    <table class="w-full text-left border-collapse h-full">
                        <thead class="sticky top-0 z-10">
                            <tr class="bg-slate-800 text-white text-xs">
                                <th class="p-3 font-bold" id="th-subject">考試科目</th>
                                <th class="p-3 font-bold" id="th-time">考試時間</th>
                                <th class="p-3 font-bold text-center" id="th-status">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="schedule-body">
                            <!-- 動態生成 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 人數統計 -->
            <div class="glass-card rounded-[2rem] p-5 shadow-sm">
                <h2 class="text-base font-bold mb-4 flex items-center opacity-80" id="stat-title">
                    <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    應考人數統計
                </h2>
                <div class="flex flex-col gap-3">
                    <div class="flex gap-3">
                        <div class="flex-1 bg-blue-500/10 p-3 rounded-xl border border-blue-500/20 flex items-center justify-between">
                            <label class="text-sm font-bold whitespace-nowrap text-blue-600" id="label-total">應考人數：</label>
                            <input type="number" value="25" class="w-16 bg-transparent text-2xl font-black focus:outline-none text-right">
                        </div>
                        <div class="flex-1 bg-emerald-500/10 p-3 rounded-xl border border-emerald-500/20 flex items-center justify-between">
                            <label class="text-sm font-bold whitespace-nowrap text-emerald-600" id="label-present">實到人數：</label>
                            <input type="number" value="25" class="w-16 bg-transparent text-2xl font-black focus:outline-none text-right">
                        </div>
                    </div>
                    <div class="bg-rose-500/10 p-3 rounded-xl border border-rose-500/20 flex items-center gap-3">
                        <label class="text-sm font-bold whitespace-nowrap text-rose-600" id="label-absent">缺考座號：</label>
                        <input type="text" placeholder="無" class="flex-grow bg-transparent text-xl font-black placeholder-rose-300 focus:outline-none">
                    </div>
                </div>
            </div>

            <!-- 注意事項 -->
            <div class="glass-card rounded-[2.5rem] p-5 shadow-sm flex-grow flex flex-col min-h-0">
                <h2 class="text-base font-bold mb-3 flex items-center opacity-80" id="note-title">
                    <svg class="w-4 h-4 mr-2 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    注意事項
                </h2>
                <textarea class="w-full flex-grow p-4 rounded-2xl bg-black/5 border border-black/5 text-lg font-bold leading-relaxed focus:outline-none" placeholder="點擊此處輸入提醒..."></textarea>
            </div>
        </section>
    </main>

    <script>
        const examData = {
            midHigh: {
                day1: [{ name: '國語', start: '08:40', end: '09:20' },{ name: '自然', start: '09:30', end: '10:10' },{ name: '英語', start: '10:30', end: '11:10' }],
                day2: [{ name: '數學', start: '08:40', end: '09:20' },{ name: '社會', start: '09:30', end: '10:10' }]
            },
            lower: {
                day1: [{ name: '國語', start: '08:40', end: '09:20' },{ name: '生活', start: '09:30', end: '10:10' }],
                day2: [{ name: '數學', start: '08:40', end: '09:20' }]
            }
        };

        let currentGrade = 'midHigh';
        let currentDay = 1;
        let currentTheme = 'bright';

        function setTheme(theme) {
            currentTheme = theme;
            document.body.className = `p-5 theme-${theme}`;
            ['bright', 'soft', 'dark'].forEach(t => {
                const btn = document.getElementById(`theme-${t}`);
                if (t === theme) {
                    btn.className = "px-3 py-1 rounded-lg font-bold transition-all text-xs bg-blue-600 text-white border-none";
                } else {
                    btn.className = "px-3 py-1 rounded-lg font-bold transition-all text-xs border border-slate-400 opacity-60";
                }
            });
        }

        function initClock() {
            const clock = document.getElementById('analog-clock');
            for (let i = 0; i < 60; i++) {
                const mark = document.createElement('div');
                mark.className = 'clock-mark' + (i % 5 === 0 ? ' hour-mark' : '');
                mark.style.transform = `translateX(-50%) rotate(${i * 6}deg)`;
                clock.appendChild(mark);
            }
            const radius = 175;
            for (let i = 1; i <= 12; i++) {
                const num = document.createElement('div');
                num.className = 'clock-number';
                num.textContent = i;
                const angle = (i * 30 - 90) * (Math.PI / 180);
                const x = 220 + radius * Math.cos(angle);
                const y = 220 + radius * Math.sin(angle);
                num.style.left = `${x}px`;
                num.style.top = `${y}px`;
                clock.appendChild(num);
            }
        }

        function updateTime() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            document.getElementById('digital-clock').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            document.getElementById('date-display').textContent = now.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
            
            const hDeg = (h % 12) * 30 + m * 0.5;
            const mDeg = m * 6 + s * 0.1;
            const sDeg = s * 6;
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
            document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
            document.getElementById('sec-hand').style.transform = `translateX(-50%) rotate(${sDeg}deg)`;
            updateSubjectStatus(h, m);
        }

        function updateSubjectStatus(currH, currM) {
            const rows = document.querySelectorAll('.subject-row');
            const nowInMins = currH * 60 + currM;
            rows.forEach(row => {
                const [sH, sM] = row.dataset.start.split(':').map(Number);
                const [eH, eM] = row.dataset.end.split(':').map(Number);
                const startInMins = sH * 60 + sM, endInMins = eH * 60 + eM;
                const statusCell = row.querySelector('.status-cell');
                let statusText = '';
                if (nowInMins < startInMins) {
                    statusText = '尚未開始';
                    statusCell.className = "p-4 status-cell text-center opacity-50 font-bold text-xs";
                } else if (nowInMins >= startInMins && nowInMins < endInMins) {
                    statusText = '● 考試中';
                    statusCell.className = "p-4 status-cell text-center text-blue-600 font-black animate-pulse text-xs";
                } else {
                    statusText = '✓ 結束';
                    statusCell.className = "p-4 status-cell text-center text-emerald-500 font-bold text-xs";
                }
                statusCell.innerHTML = statusText;
            });
        }

        function setGrade(grade) {
            currentGrade = grade;
            document.getElementById('btn-midHigh').className = (grade === 'midHigh') ? "px-3 py-1 rounded-lg font-bold bg-blue-600 text-white shadow-sm" : "px-3 py-1 rounded-lg font-bold opacity-60 hover:bg-black/10";
            document.getElementById('btn-lower').className = (grade === 'lower') ? "px-3 py-1 rounded-lg font-bold bg-blue-600 text-white shadow-sm" : "px-3 py-1 rounded-lg font-bold opacity-60 hover:bg-black/10";
            renderSchedule();
        }

        function setDay(day) {
            currentDay = day;
            const d1 = document.getElementById('day1-tab'), d2 = document.getElementById('day2-tab');
            if (day === 1) { 
                d1.classList.add('active-tab'); d1.classList.remove('opacity-50');
                d2.classList.remove('active-tab'); d2.classList.add('opacity-50');
            } else { 
                d2.classList.add('active-tab'); d2.classList.remove('opacity-50');
                d1.classList.remove('active-tab'); d1.classList.add('opacity-50');
            }
            renderSchedule();
        }

        function renderSchedule() {
            const body = document.getElementById('schedule-body');
            body.innerHTML = '';
            examData[currentGrade][`day${currentDay}`].forEach(sub => {
                const tr = document.createElement('tr');
                tr.className = 'subject-row border-b border-black/5';
                tr.dataset.start = sub.start; tr.dataset.end = sub.end;
                tr.innerHTML = `
                    <td class="p-4 text-4xl font-black">${sub.name}</td>
                    <td class="p-4 text-3xl font-mono font-bold opacity-80">${sub.start}-${sub.end}</td>
                    <td class="p-4 status-cell text-center"></td>
                `;
                body.appendChild(tr);
            });
            updateTime();
        }

        window.onload = () => { 
            initClock(); 
            setInterval(updateTime, 1000); 
            setGrade('midHigh');
            setTheme('bright');
        };
    </script>
</body>
</html>
